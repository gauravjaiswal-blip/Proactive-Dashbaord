<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success Guide Dashboard</title>

    <script>
        function refreshDashboard() {
            document.getElementById("dashboard").src =
                "success_guide_dashboard_v2.html?v=" + Date.now();
        }

        // Refresh every 1 hour
        setInterval(refreshDashboard, 60 * 60 * 1000);
    </script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>

<iframe
    id="dashboard"
    src="success_guide_dashboard_v2.html">
</iframe>

</body>
</html>
